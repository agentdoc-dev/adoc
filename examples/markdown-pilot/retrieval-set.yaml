# V1.7.3 hybrid evaluation set for the Markdown Pilot: a mixed corpus of 15
# Markdown prose pages plus the native Knowledge Objects in `knowledge/`.
# Blended cases prove the honest KO/prose blend (ADR-0040): Knowledge Objects
# win when a citable contract answers the query; prose wins when only
# tutorial/runbook text does. Ranking stays parameter-free — these fixtures
# pin behavior, they never tune it.
#
# Rank-1 assertions run in lexical mode: BM25 rank is deterministic and
# embedding-backend-independent, so it isolates the "blend is honest by rank"
# property. Hybrid cases pin what hybrid fusion guarantees regardless of the
# embedding model: exact Object ID pins rank first, and strong matches stay
# inside a top-5 window of the fused top-10 pool.
#
# Every case lists the pilot's full compat diagnostic budget: the retrieval
# envelope carries the graph artifact's load diagnostics, and this corpus
# compiles with exactly these four warning codes.

- name: lexical blended KO-first settlement paraphrase
  query: "settlement posts once"
  mode: lexical
  scope: blended
  top: 10
  expected_ids: [billing.settlement.posts-once]
  must_appear_in_top: 1
  expected_diagnostics:
    - compat.unknown_extension
    - compat.raw_html_quarantined
    - compat.unsafe_link_dropped
    - compat.unsafe_image_src_dropped

