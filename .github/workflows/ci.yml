name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      fastembed:
        description: Run gated FastEmbed retrieval tests
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTDOCFLAGS: -D warnings

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install --no-self-update

      - name: Cache Cargo data
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Build
        run: cargo build --workspace --locked

      - name: Build documentation
        run: cargo doc --workspace --no-deps --locked

  fastembed-retrieval:
    name: FastEmbed Retrieval
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.fastembed }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install --no-self-update

      - name: Cache Cargo data
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-fastembed-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fastembed-
            ${{ runner.os }}-cargo-

      - name: Run retrieval pilot with FastEmbed
        run: cargo test -p adoc-cli --test retrieval_pilot --features fastembed-it --locked
